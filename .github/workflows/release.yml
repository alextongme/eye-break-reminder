name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build app bundle
        run: bash build-app.sh "${{ steps.version.outputs.VERSION }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          gh release create "$GITHUB_REF_NAME" \
            "dist/CountTongulasEyeBreak-${VERSION}.zip" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Get SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA=$(shasum -a 256 "dist/CountTongulasEyeBreak-${VERSION}.zip" | awk '{print $1}')
          echo "SHA256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew Cask
        env:
          CASK_PAT: ${{ secrets.CASK_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          SHA="${{ steps.sha.outputs.SHA256 }}"

          git clone https://x-access-token:${CASK_PAT}@github.com/alextongme/homebrew-cask.git /tmp/homebrew-cask
          cd /tmp/homebrew-cask

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/count-tongulas-eye-break.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/count-tongulas-eye-break.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update count-tongulas-eye-break to v${VERSION}"
          git push
